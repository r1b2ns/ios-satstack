name: MempoolMonitor

options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  developmentRegion: en
  # Garante que o xcodeproj gerado fique na mesma pasta deste arquivo
  createIntermediateGroups: true
  groupSortPosition: none

# ─── Configurações a nível de projeto (equivale aos XCBuildConfiguration do root) ───
settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_BOOL_CONVERSION: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_CONSTANT_CONVERSION: YES
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
    CLANG_WARN_DIRECT_OBJC_ISA_USAGE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_EMPTY_BODY: YES
    CLANG_WARN_ENUM_CONVERSION: YES
    CLANG_WARN_INFINITE_RECURSION: YES
    CLANG_WARN_INT_CONVERSION: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_OBJC_ROOT_CLASS: YES_ERROR
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_WARN_UNREACHABLE_CODE: YES
    CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
    COPY_PHASE_STRIP: NO
    ENABLE_STRICT_OBJC_MSGSEND: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    GCC_NO_COMMON_BLOCKS: YES
    GCC_WARN_64_TO_32_BIT_CONVERSION: YES
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: YES
    GCC_WARN_UNUSED_VARIABLE: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MTL_FAST_MATH: YES
    SDKROOT: iphoneos
  debug:
    DEBUG_INFORMATION_FORMAT: dwarf
    ENABLE_TESTABILITY: YES
    GCC_DYNAMIC_NO_PIC: NO
    GCC_OPTIMIZATION_LEVEL: "0"
    GCC_PREPROCESSOR_DEFINITIONS:
      - "DEBUG=1"
      - "$(inherited)"
    MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
    ONLY_ACTIVE_ARCH: YES
    SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
  release:
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_NS_ASSERTIONS: NO
    SWIFT_COMPILATION_MODE: wholemodule
    VALIDATE_PRODUCT: YES

# ─── Targets ───────────────────────────────────────────────────────────────────
targets:
  MempoolMonitor:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # Fontes do app + tipos compartilhados com o widget extension
    sources:
      - path: MempoolMonitor
      - path: Shared

    # Info.plist gerenciado pelo XcodeGen — source of truth está aqui.
    # "properties" faz o XcodeGen gerar/sobrescrever o arquivo em cada "xcodegen generate".
    info:
      path: MempoolMonitor/Info.plist
      properties:
        # ── Bundle identity ────────────────────────────────────────────────
        CFBundleDevelopmentRegion:    "$(DEVELOPMENT_LANGUAGE)"
        CFBundleExecutable:           "$(EXECUTABLE_NAME)"
        CFBundleIdentifier:           "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName:                 "$(PRODUCT_NAME)"
        CFBundleDisplayName:          Mempool Monitor
        CFBundlePackageType:          APPL
        CFBundleShortVersionString:   "$(MARKETING_VERSION)"
        CFBundleVersion:              "$(CURRENT_PROJECT_VERSION)"

        # ── Launch screen (obrigatório para resolução nativa no iPhone) ────
        # Sem esta chave o iOS exibe o app em modo compatibilidade (barras pretas).
        UILaunchScreen: {}

        # ── Cenas ─────────────────────────────────────────────────────────
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}

        # ── App Transport Security — permite HTTP para localhost e servidor local ──
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
            192.168.15.33:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false

        # ── Live Activities ────────────────────────────────────────────────
        NSSupportsLiveActivities: true

        # ── Configurações de servidor (lidas em runtime via Bundle.main) ───
        MempoolMonitorHost: "$(MEMPOOL_MONITOR_HOST)"

    # Entitlements — XcodeGen define CODE_SIGN_ENTITLEMENTS automaticamente.
    # "properties" faz o XcodeGen gerar/sobrescrever o arquivo (source of truth aqui).
    entitlements:
      path: MempoolMonitor/MempoolMonitor.entitlements
      properties:
        # Push Notifications — obrigatório para APNs funcionar no device.
        # Use "development" para builds Debug/Ad-hoc e "production" para App Store.
        aps-environment: development

    # ─── xcconfig local (não versionado) ────────────────────────────────────
    # Contém PRODUCT_BUNDLE_IDENTIFIER e outras chaves privadas.
    # Crie o arquivo a partir do template: cp Configs/Local.xcconfig.template Configs/Local.xcconfig
    configFiles:
      Debug: Configs/Local.xcconfig
      Release: Configs/Local.xcconfig

    # ─── Configurações a nível de target ────────────────────────────────────
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: X7R68587M4
        # INFOPLIST_FILE e GENERATE_INFOPLIST_FILE são definidos automaticamente
        # pelo XcodeGen a partir de info.path acima — não duplicar aqui.
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        MARKETING_VERSION: "1.0"
        # PRODUCT_BUNDLE_IDENTIFIER → definido em Configs/Local.xcconfig
        PRODUCT_NAME: "$(TARGET_NAME)"
        PROVISIONING_PROFILE_SPECIFIER: ""
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"

    # ─── Widget extension embutido no app ────────────────────────────────────
    dependencies:
      - target: MempoolMonitorWidget
        embed: true

# ─────────────────────────────────────────────────────────────────────────────
  MempoolMonitorWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"

    # Fontes do widget + tipos compartilhados com o app
    sources:
      - path: MempoolMonitorWidget
      - path: Shared

    # Info.plist do widget — gerenciado pelo XcodeGen
    info:
      path: MempoolMonitorWidget/Info.plist
      properties:
        CFBundleDevelopmentRegion:    "$(DEVELOPMENT_LANGUAGE)"
        CFBundleExecutable:           "$(EXECUTABLE_NAME)"
        CFBundleIdentifier:           "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName:                 "$(PRODUCT_NAME)"
        CFBundlePackageType:          "XPC!"
        CFBundleShortVersionString:   "$(MARKETING_VERSION)"
        CFBundleVersion:              "$(CURRENT_PROJECT_VERSION)"
        # Ponto de extensão obrigatório para WidgetKit / Live Activities
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

    # Mesmo xcconfig do app — expõe PRODUCT_BUNDLE_IDENTIFIER_WIDGET
    configFiles:
      Debug: Configs/Local.xcconfig
      Release: Configs/Local.xcconfig

    # ─── Configurações a nível de target ────────────────────────────────────
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: X7R68587M4
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../../Frameworks"
        MARKETING_VERSION: "1.0"
        # Bundle ID vem da chave PRODUCT_BUNDLE_IDENTIFIER_WIDGET do Local.xcconfig
        PRODUCT_BUNDLE_IDENTIFIER: "$(PRODUCT_BUNDLE_IDENTIFIER_WIDGET)"
        PRODUCT_NAME: "$(TARGET_NAME)"
        PROVISIONING_PROFILE_SPECIFIER: ""
        # Não instala a extension como artefato independente
        SKIP_INSTALL: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"

# ─────────────────────────────────────────────────────────────────────────────
  MempoolMonitorTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: MempoolMonitorTests

    # Info.plist gerado pelo XcodeGen (não versionar — está no .gitignore)
    info:
      path: MempoolMonitorTests/Info.plist
      properties:
        CFBundleDevelopmentRegion:    "$(DEVELOPMENT_LANGUAGE)"
        CFBundleExecutable:           "$(EXECUTABLE_NAME)"
        CFBundleIdentifier:           "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName:                 "$(PRODUCT_NAME)"
        CFBundlePackageType:          BNDL
        CFBundleShortVersionString:   "$(MARKETING_VERSION)"
        CFBundleVersion:              "$(CURRENT_PROJECT_VERSION)"

    # Mesmo xcconfig do app — expõe PRODUCT_BUNDLE_IDENTIFIER_TESTS
    configFiles:
      Debug: Configs/Local.xcconfig
      Release: Configs/Local.xcconfig

    settings:
      base:
        # Carrega o test bundle dentro do processo do app host, permitindo
        # @testable import MempoolMonitor e acesso a tipos internos.
        BUNDLE_LOADER:        "$(TEST_HOST)"
        TEST_HOST:            "$(BUILT_PRODUCTS_DIR)/MempoolMonitor.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MempoolMonitor"
        CODE_SIGN_IDENTITY:   "Apple Development"
        CODE_SIGN_STYLE:      Automatic
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM:     X7R68587M4
        MARKETING_VERSION:    "1.0"
        # Bundle ID vem da chave PRODUCT_BUNDLE_IDENTIFIER_TESTS do Local.xcconfig
        PRODUCT_BUNDLE_IDENTIFIER: "$(PRODUCT_BUNDLE_IDENTIFIER_TESTS)"
        PRODUCT_NAME:         "$(TARGET_NAME)"
        SWIFT_VERSION:        "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"

    dependencies:
      - target: MempoolMonitor

# ─── Schemes ──────────────────────────────────────────────────────────────────
# Widget extensions não podem ser lançadas diretamente — precisam do app host.
# O scheme do widget é configurado para lançar o MempoolMonitor como executable,
# o que instala o app (que já embute o widget) e permite debug/preview da extension.
schemes:
  MempoolMonitor:
    build:
      targets:
        MempoolMonitor:      all
        MempoolMonitorWidget: all          # widget é embutido no app
        MempoolMonitorTests: [build, test]
    run:
      config: Debug
      executable: MempoolMonitor
    test:
      config: Debug
      targets:
        - MempoolMonitorTests
    profile:
      config: Release
      executable: MempoolMonitor
    analyze:
      config: Debug
    archive:
      config: Release

  MempoolMonitorWidget:
    build:
      targets:
        MempoolMonitor: all           # garante que o app host seja buildado junto
        MempoolMonitorWidget: all
    run:
      config: Debug
      executable: MempoolMonitor      # lança o app host, não a extension isolada
    profile:
      config: Release
      executable: MempoolMonitor

  MempoolMonitorTests:
    build:
      targets:
        MempoolMonitor:      [build, test]   # app host obrigatório para bundle loader
        MempoolMonitorTests: [build, test]
    test:
      config: Debug
      targets:
        - MempoolMonitorTests
    run:
      config: Debug
      executable: MempoolMonitor
